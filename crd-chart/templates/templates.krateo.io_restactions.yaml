                      - name
                      type: object
                    endpointRef:
                      description: EndpointRef a reference to an Endpoint
                      properties:
                        name:
                          description: Name of the referenced object.
                          type: string
                        namespace:
                          description: Namespace of the referenced object.
                          type: string
                      required:
                      - name
                      - namespace
                      type: object
                    errorKey:
                      type: string
                    exportJwt:
                      type: boolean
                    filter:

apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-snowplow-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: krateo-snowplow-agent
    app.kubernetes.io/part-of: krateo-snowplow
spec:
  type: Declarative
  description: >-
    The Krateo snowplow expert: authors RESTAction CRDs and explains how snowplow composes/serves
    portal content at runtime (the /call API that populates widgets when read by the frontend or
    curl). Knows braghettos/snowplow + braghettos/krateo-snowplow-chart (this chart's sources).
  declarative:
    deployment:
      env:
{{- include "krateo-snowplow-agent.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.modelConfig.name }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: krateo-snowplow-agent-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/snowplow_agent"}}`}}
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - k8s_get_resources
            - k8s_get_resource_yaml
            - k8s_apply_manifest
            - k8s_check_service_connectivity
{{- if .Values.github.enabled }}
      - type: McpServer
        mcpServer:
          name: {{ .Values.github.mcpServer }}
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - get_file_contents
            - search_code
            - search_repositories
{{- end }}
    a2aConfig:
      skills:
        - id: restactions
          name: Author RESTActions
          description: Create Krateo RESTAction CRs (JQ filters, endpoint refs), grounded in the CRD + source.
          tags: [krateo, restaction, snowplow, jq]
          examples:
            - Create a RESTAction that lists the pods in the cluster.
        - id: portal-content
          name: Portal content serving
          description: >-
            Explain/diagnose how snowplow composes and serves portal content (/call?resource=...) that
            populates widgets at runtime when read by the frontend or curl.
          tags: [krateo, snowplow, portal, content-api]
          examples:
            - The portal shows "widget does not exist" after login — why?
            - How does the frontend get its navmenus/routes/pages from snowplow?
    deployment:
      resources:
{{- toYaml .Values.resources | nindent 8 }}

apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-snowplow-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: krateo-snowplow-agent
    app.kubernetes.io/part-of: krateo-snowplow
spec:
  type: Declarative
  description: >-
    The Krateo snowplow specialist: authors RESTAction CRs (templates.krateo.io/v1 — JQ filters,
    endpointRef, dependsOn sequence/iteration, exportJwt) and explains/diagnoses how snowplow's
    /call?resource=... content-composition API serves portal content (navmenus, routesloaders, routes,
    pages, panels, and widget definitions+data) at runtime, grounded in braghettos/krateo-snowplow (source)
    and braghettos/krateo-snowplow-chart (docs+chart).
  declarative:
    deployment:
      env:
{{- include "snowplow-agent.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.modelConfig.name }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: snowplow-agent-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/snowplow_agent"}}`}}
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          # NO requireApproval here — consistent with the frontend-agent. This agent uses
          # k8s_apply_manifest ONLY to server-DRY-RUN-VALIDATE the RESTActions it authors (it
          # returns the CR; it does not persist it). The REAL write gate is downstream: the
          # frontend's publishPage/publishBlueprint blast-radius confirm. Gating the dry-run here
          # (the global .Values.hitlApproval default) surfaced a 2-level-deep nested confirmation
          # when the frontend-agent delegates RA authoring, which the human rail only intermittently
          # rendered → the authoring turn stalled. (hitlApproval stays an accepted value for
          # installer/schema compat but no longer gates the authoring dry-run.)
          toolNames:
            - k8s_get_resources
            - k8s_get_resource_yaml
            - k8s_apply_manifest
            - k8s_check_service_connectivity
{{- if .Values.fetch.enabled }}
      # Tokenless doc grounding: GET the version-pinned raw docs/llms.txt URL (public, no auth/token).
      - type: McpServer
        mcpServer:
          name: {{ .Values.fetch.mcpServer }}
          kind: MCPServer
          apiGroup: kagent.dev
          toolNames:
            - fetch
{{- end }}
{{- if .Values.github.enabled }}
      - type: McpServer
        mcpServer:
          name: {{ .Values.github.mcpServer }}
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - get_file_contents
            - search_code
            - search_repositories
{{- end }}
    a2aConfig:
      skills:
        - id: author-restactions
          name: Author RESTActions
          description: >-
            Create and wire templates.krateo.io/v1 RESTAction CRs — JQ filters, endpointRef auth,
            dependsOn sequencing/iteration, exportJwt — grounded in the CRD and snowplow source.
          tags: [krateo, restaction, snowplow, jq, templates-krateo-io]
          examples:
            - Create a RESTAction that lists the pods in the cluster.
            - Write a RESTAction that calls an external API using an endpointRef Secret for auth.
            - Chain two calls with dependsOn and run the second one per item in the first's result.
            - Shape a RESTAction's global filter output into the items array a Table widget expects.
        - id: portal-content-serving
          name: Portal content serving
          description: >-
            Explain and diagnose how snowplow composes and serves portal content via /call?resource=...
            (navmenus, routes, pages, panels, widget data) that populates widgets at runtime.
          tags: [krateo, snowplow, portal, content-api, call-endpoint]
          examples:
            - The portal shows a "widget does not exist" 404 after a successful login — why?
            - How does the frontend fetch its navmenus and routes from snowplow?
            - The snowplow pod is stuck in ContainerCreating on FailedMount — what's wrong?
            - Walk me through how /call composes portal content at runtime.
    deployment:
      resources:
{{- toYaml .Values.resources | nindent 8 }}

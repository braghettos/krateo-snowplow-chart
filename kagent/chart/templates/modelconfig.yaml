{{- if .Values.modelConfig.create }}
# Dedicated ModelConfig for this agent (modelConfig.create=true), so its model/provider is
# configured independently of the other agents.
apiVersion: kagent.dev/v1alpha2
kind: ModelConfig
metadata:
  name: {{ .Values.modelConfig.name }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Values.modelConfig.name }}
spec:
  provider: {{ .Values.modelConfig.provider }}
  model: {{ .Values.modelConfig.model }}
{{- if eq .Values.modelConfig.provider "GeminiVertexAI" }}
  geminiVertexAI:
    projectID: {{ .Values.modelConfig.vertexAI.projectID | quote }}
    location: {{ .Values.modelConfig.vertexAI.location | quote }}
{{- else if .Values.modelConfig.apiKeySecret }}
  apiKeySecret: {{ .Values.modelConfig.apiKeySecret }}
  apiKeySecretKey: {{ .Values.modelConfig.apiKeySecretKey }}
{{- end }}
{{- end }}

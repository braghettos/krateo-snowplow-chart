namespace: krateo-system

# ModelConfig for this agent. By default it REFERENCES a ModelConfig by name (e.g. one the
# autopilot ships: gemini-flash / gemini-pro). Set create=true to provision a DEDICATED ModelConfig
# for THIS agent, so it can use a different model/provider independently of the other agents.
modelConfig:
  # gemini-pro (not flash): this is an AUTHORING specialist — it composes RESTActions (+ widget
  # apiRef wiring), the same authoring role that runs helm-agent + frontend-agent on pro. Authoring
  # valid CRs + reading apiserver validation errors needs the stronger model.
  name: gemini-pro
  create: false
  provider: GeminiVertexAI          # GeminiVertexAI (ADC) | Gemini (API key) | Anthropic | OpenAI
  model: gemini-2.5-flash
  vertexAI:                         # used when provider == GeminiVertexAI
    projectID: ""
    location: us-central1
  apiKeySecret: ""                  # used when the provider needs a key (Gemini/Anthropic/OpenAI)
  apiKeySecretKey: ""
prompts:
  language: eng

# Human-in-the-loop gate on the mutating k8s tools (k8s_apply_manifest) the agent
# uses to apply RESTAction CRs. true = pause for approval (safe); false = autonomous.
hitlApproval: true

# GeminiVertexAI via ADC (matches the autopilot). Wired by the installer from .Values.vertexAI.
vertexAI:
  enabled: true
  projectID: ""
  location: us-central1

# Tokenless fetch MCP (kagent MCPServer, fetch-mcp-server) — GETs the version-pinned public raw
# docs/llms.txt URL (no token/auth). This is the default grounding path; the chart stamps the
# deployed tag into the URL in the prompt footer.
fetch:
  enabled: true
  mcpServer: fetch-mcp-server

# github MCP server for DEEPER source reading (search_code, etc.) — OPT-IN, off by default: it
# requires the github-mcp-server running with a PAT. Doc grounding uses the tokenless fetch tool above.
github:
  enabled: false
  mcpServer: github-mcp-server

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

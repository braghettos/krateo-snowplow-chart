# Default values for snowplow (braghettos fork — clean-slate-0.30.0).
#
# This is the stripped variant of the chart, compatible with the
# upstream `0.20.5` snowplow binary (commit 6375c9a). Every value
# the 0.20.5 binary cannot consume is REMOVED here:
#   - probePort 8082 + isolated probe server (R2 listener does not
#     exist at 0.20.5; probes target the main `http` port)
#   - cache-warmup-config volume (cache subsystem absent at 0.20.5)
#   - frontend-config volume (entry-point prewarm absent at 0.20.5)
#   - snowplow-api-override extraEnvFrom (config carrier removed)
#   - CACHE_ENABLED env (cache subsystem absent)
#   - PREWARM_MODE/PREWARM_WORKERS/PREWARM_QUEUE env (prewarm absent)
#   - OTEL_* env (OpenTelemetry absent at 0.20.5)
#
# Re-grow tag-by-tag as features ship per the canonical roadmap in
# /Users/diegobraga/krateo/snowplow-cache/snowplow/docs/implementation-plan-detailed.md.

replicaCount: 1

progressDeadlineSeconds: 600

image:
  repository: ghcr.io/braghettos/snowplow
  pullPolicy: Always
  # Pinned to the clean-slate baseline tag.
  tag: "0.30.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: LoadBalancer
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Modest defaults — 0.20.5 has no in-process cache, no informer, no
# prewarm; memory needs are dominated by per-request resolution and
# transient JSON marshal/unmarshal. Re-tune at later tags as the
# cache + informer re-land.
resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Probes target the main `http` listener — 0.20.5 has no second
# listener. K8s defaults retained except for an explicit failureThreshold
# headroom on liveness so transient scheduler hiccups do not restart
# the pod.
startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 3

livenessProbe:
  httpGet:
    path: /health
    port: http
  periodSeconds: 10
  timeoutSeconds: 3
  failureThreshold: 5

readinessProbe:
  httpGet:
    # Upstream 0.20.5 binary registers /health (and /api-info/names,
    # swagger) but does NOT expose a separate /ready endpoint. Using
    # /ready here drives the probe to a permanent 404, which surfaces
    # at deploy time as a NotReady pod that has to be unblocked by an
    # out-of-band --set readinessProbe.httpGet.path=/health override.
    # /health is also wired to liveness/startup against this binary;
    # revisit when upstream adds a dedicated /ready handler.
    path: /health
    port: http
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Command-line args for the snowplow container. Empty by default
# (the binary reads all config from env).
args: []

# No extra volumes at 0.20.5 — chart manages only the jq-modules ConfigMap.
volumes: []
volumeMounts: []

# No extra envFrom at 0.20.5.
extraEnvFrom: []

# No init containers — Redis sidecar removal predates this baseline
# but the field is preserved for chart-shape compatibility.
initContainers: []

nodeSelector: {}
tolerations: []
affinity: {}

# Env vars rendered into the chart's snowplow ConfigMap and consumed
# via envFrom. Only knobs the 0.20.5 binary actually reads.
env:
  DEBUG: "false"
  BLIZZARD: "false"
  SKIP: "false"
  JQ_MODULES_PATH: /jq-modules

jwtSignKeySecretName: jwt-sign-key

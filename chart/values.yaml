# Default values for snowplow (braghettos fork — clean-slate-0.30.0).
#
# This is the chart re-grown to 0.30.224 (Ship 0.5.5 — probe split).
# Original clean-slate-0.30.0 baseline stripped every value the
# upstream 0.20.5 binary could not consume; re-grow notes below.
#
# Originally stripped at clean-slate-0.30.0 (0.20.5-binary baseline):
#   - probePort 8082 + isolated probe server (R2 listener does not
#     exist at 0.20.5; probes target the main `http` port — Ship 0.5.5
#     keeps this single-listener shape; probe isolation is not the
#     mechanism)
#   - cache-warmup-config volume (cache subsystem absent at 0.20.5)
#   - frontend-config volume (entry-point prewarm absent at 0.20.5)
#   - snowplow-api-override extraEnvFrom (config carrier removed)
#   - CACHE_ENABLED env (cache subsystem absent at 0.20.5; re-added at
#     0.30.4 with default "true" — cache=on activation per Revision 1)
#   - PREWARM_MODE/PREWARM_WORKERS/PREWARM_QUEUE env (prewarm absent)
#   - OTEL_* env (OpenTelemetry absent at 0.20.5)
#
# Re-grow tag-by-tag per the canonical roadmap in snowplow/docs/
# implementation-plan-detailed.md. At 0.30.4 the cache subsystem is
# activated (CACHE_ENABLED=true); the toggle is preserved so override
# --set env.CACHE_ENABLED=false at install/upgrade time restores the
# 0.30.3 (cache=off) behaviour for parity measurements.

replicaCount: 1

progressDeadlineSeconds: 600

image:
  repository: ghcr.io/braghettos/snowplow
  pullPolicy: Always
  # drop-WithSkipMapper / 0.30.231 — closes the FIVE-revert loop on the
  # production-aim cleanup surface (0.30.226 / 0.30.228 / 0.30.229 /
  # 0.30.230). Ship 0.30.230's rc-at-root fix at 12 ResolveOptions
  # construction sites DID work — rc was non-nil end-to-end. The crash
  # was a SEPARATE defect: dynamic.WithSkipMapper() from #119 leaves
  # uc.mapper=nil; resourceInterfaceFor (client.go:146) calls
  # uc.mapper.RESTMapping unconditionally, panicking on first Get.
  # 0.30.231 deletes WithSkipMapper and accepts per-call mapper build
  # (dead allocation, invisible at customer vantage). Pod-boot-readiness
  # gate validated 0.30.229+0.30.230, this ship is the structural fix.
  #
  # 0.30.232 (attempt #7 — type-safety constructor): six HARD REVERTs
  # (0.30.226 → 0.30.231) traced to a recurring blind-spot: a
  # phase1Walker struct literal omitting the rc field. Site #3
  # (prewarm_engine_boot.go:124 rePrewarmBoot) was the bug-bearing site
  # — not a crashloop but a silent re-walk failure (continue-on-error
  # at line 139), defeating the boot-race fix. 0.30.232 introduces
  # newPhase1Walker(rc, authnNS, opts...) as the SOLE constructor —
  # rc is REQUIRED at the type level, the compiler enforces every
  # construction site supplies it. Correctness-only, no perf delta.
  #
  # 0.30.233 (S4 cache-invalidation fix): restores the pre-Ship-0.5
  # CRD-informer → discovery backplane as a SIMPLER additive
  # side-effect on the existing customresourcedefinitions informer's
  # AddFunc. Ship 0.5 / 0.30.223 (v6) deleted the CRD informer on the
  # assumption walker-driven on-demand discovery would cover the
  # CRD-add path. TRACED defect (S4 ConvergenceTimeout on Path B bench
  # harness, run-20260602-064642): the walker chain races itself into
  # a stuck zero-state when a CRD is created at runtime — stage 1 of
  # compositions-list cached the (then-empty) CRD LIST, stage 2
  # iterator never reached the templated apiserver path, the
  # discovery hop never fired, composition CR informer never
  # registered, piechart served api=0 ui=0 indefinitely. Fix is
  # mechanism-uniform (predicate IsCRDGVR(gvr), applies to ANY group)
  # with PM tightenings: bounded worker channel (DiscoverGroupResources
  # network hop runs OFF informer processor goroutine) +
  # defer-recover wrappers (malformed CRD object cannot panic-kill
  # pod). Always-on, no flag.
  #
  # 0.30.235 (UAF layering fix): Phase 6 #126 first canonical run on
  # 0.30.233 hit S4 ConvergenceTimeout for cyberjoker (api=0 ui=0
  # expected=1 cluster=20). Live-cluster TRACE pinpointed a LAYERING
  # ordering bug: compositions-list RA stage filter projects items
  # without .metadata; UAF namespaceFrom=".metadata.namespace" then
  # runs on the projected shape, evalJQString returns "",
  # EvaluateRBAC(verb=list, ns="") becomes a cluster-scope check, and
  # narrow-RBAC users (cyberjoker) are denied (no cluster-scope grant).
  # Admin masks the bug via cluster-admin CRB. Fix moves UAF refilter
  # INSIDE jsonHandlerCore, BEFORE the stage filter projects items —
  # the refilter sees the raw K8s envelope (with .metadata) and
  # EvaluateRBAC receives the correct namespace. Post-g.Wait()
  # applyUserAccessFilter callsite DELETED; new call is per-worker
  # via applyUserAccessFilterOnPig. Mechanism-uniform across every
  # RA + identity (no per-RA carve-out). Permanent regression gate
  # at internal/resolvers/restactions/api/refilter_layering_test.go.
  #
  # 0.30.236 (L1 Pinned=true for widgets/restactions cohort cells):
  # Phase 6 #126 on 0.30.235 still showed S6 Dashboard COLD 2.02x WARM
  # (L1-miss-after-mutation defect). Architect TRACE: widgets and
  # restactions cohort cells written Pinned:false at 4 production Put
  # sites; the 1.5 GiB resident region sat empty while customer-facing
  # cells lived in the transient LRU. Composition-CRUD storm produced
  # >800K dirty-mark enqueues; refresher re-Puts of OTHER cohorts
  # evicted target cells via LRU; refresher_skipped_no_entry=126,933
  # measured on 0.30.235 — refresher dequeued keys whose entries had
  # already been LRU-evicted. Fix sets Pinned:true at the 4 Put sites
  # (phase1_pip_seed.go seedOneRestaction + seedOneWidget; restactions.go
  # + widgets.go per-user fallbacks; resolve_populate.go refresher
  # re-populate via T1 named CacheEntryClass{Widgets,Restactions}
  # constants per feedback_no_special_cases). Pin-honour at
  # resolved.go:761-773 already degrades to transient on resident
  # overflow — no OOM path. T8 expvar surface (resident_demote_total +
  # companions) lets the gate observe silent demote. Side-fix to
  # prewarm_engine_boot.go bumps pipSeed* counters on the engine path
  # (legacy seedCohort path bumped, engine path didn't — Gate A would
  # have read 0 even on a successful seed). Gate C is load-bearing:
  # bench SCALE=5000 COLD <= 1.05x WARM at every measurement stage;
  # HARD REVERT to 0.30.235 if Gate C fails.
  #
  # 0.30.237 (Stage 1 — boot-scope cohort-parallel seed + Lever A/B/C):
  # 0.30.236 was HARD REVERTED (helm rev 409 to 0.30.235). F3 mechanism
  # was sound (Pinned:true at 4 production Put sites), but the boot
  # prewarm engine path's seedScopeYielding had silently regressed from
  # the legacy runPIPSeed parallel shape (cohort-parallel errgroup at
  # GOMAXPROCS — phase1_pip_seed.go:382-387) into nested SERIAL loops at
  # prewarm_engine_boot.go:217-340. Empirical throughput at 5K-comp
  # scale was 0.68 puts/s wall-clock; the widget seed loop never even
  # started inside the 8-min pipGlobalTimeout window. Gate C measured
  # 44-53% L1 miss on widgets|markdowns / widgets|panels / widgets|buttons
  # after a 5K bench. Stage 1 RESTORES the legacy parallel shape (NOT
  # invent a new flat-pool design — predecessor's runPIPSeed is the
  # proven 30+ ship prior art). Cohorts run as GOMAXPROCS parallel
  # goroutines; RA/widget iteration inside the cohort stays serial to
  # bound per-cohort transient bytes. F3 Pinned:true is RETAINED IN
  # SOURCE (HEAD = 0.30.236; helm rolled back the binary, not the tree)
  # — Stage 1 ships F3 alongside the parallelism restoration. Lever A:
  # pipGlobalTimeout converted const→var, reads PREWARM_BOOT_TIMEOUT_
  # MINUTES (default 8). Lever B: per-cohort progress log so operator
  # tells "slow but progressing" from "stuck" mid-boot. Lever C: new
  # snowplow_phase1_seed_units_planned_total expvar so operator can
  # project ETA from planned vs done. Stage 2 (CRUD triggers) is
  # DEFERRED to 0.30.238 — Stage 1 alone fixes Gate C.
  tag: "0.30.237"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
securityContext: {}

service:
  type: LoadBalancer
  port: 8081

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

# Modest defaults — 0.20.5 has no in-process cache, no informer, no
# prewarm; memory needs are dominated by per-request resolution and
# transient JSON marshal/unmarshal. Re-tune at later tags as the
# cache + informer re-land.
resources:
  limits:
    cpu: 2
    memory: 2Gi
  requests:
    cpu: 500m
    memory: 512Mi

# Deployment strategy — Recreate by default.
#
# Ship 0.5.5 — production memory request is 24Gi and only one node has
# that much free; RollingUpdate (maxSurge>0) requires the new pod to
# schedule BEFORE the old pod terminates, which fails on memory pressure
# (FailedScheduling / NotTriggerScaleUp). Recreate scales the old pod to
# zero first, freeing the node, then schedules the new pod. /readyz
# (gated on cache.IsPhase1Done) holds the LB out of the new pod until
# every walker-discovered informer HasSynced, so user-facing traffic
# does not hit a cold pod even though there is a brief window with no
# Ready endpoint.
#
# Override to RollingUpdate only when resource requests fit twice the
# pod into the cluster (e.g. multi-node, larger nodes).
strategy:
  type: Recreate

# Ship 0.5.5 — liveness/readiness probe split.
#
# All three probes target the main :8081 listener — there is NO
# dedicated probe port in this binary. The split lives in the
# HANDLERS:
#   /health  -> liveness-only, process-alive-only (handlers.HealthCheck
#               returns 200 unconditionally with a static 17-byte body,
#               no apiserver / disk touches per probe).
#   /readyz  -> readiness-only, gates on cache.IsPhase1Done() — flips to
#               200 once the Phase 1 walker AND every walker-discovered
#               informer have HasSynced.

# startupProbe — defensive window from container-start to HTTP-bind.
# Effective window: 30 × 10s = 5 min. Process typically binds <1s but
# image-pull / scheduler hiccups can stretch this; once it passes once,
# kubelet hands off to livenessProbe.
startupProbe:
  httpGet:
    path: /health
    port: http
  failureThreshold: 30
  periodSeconds: 10
  timeoutSeconds: 3

# livenessProbe — relies on the Ship 0.5.5 process-alive-only handler.
# failureThreshold 100 × periodSeconds 30 = ~50 min effective ceiling.
# Intentionally generous: at production scale (50K compositions + 30K
# ArgoCD apps + 17K panels) the Phase 1 informer-sync barrier can
# legitimately take 5–15 min, and we do NOT want a slow but healthy
# pod to be restarted. Because the probe handler does ZERO apiserver
# / disk work, failing it 100 times means the process is truly hung
# (deadlock or full GOMAXPROCS starvation), at which point restart is
# the correct response.
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 60
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 100

# readinessProbe — gates the Service LB on /readyz (Phase 1 done).
# failureThreshold 3 × periodSeconds 5 = ~15 s tail before kubelet
# removes the pod from Service endpoints when readiness flips back to
# 503 (the flag is one-shot today; tight tail is in place for future
# re-warm cycles).
readinessProbe:
  httpGet:
    path: /readyz
    port: http
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

# Command-line args for the snowplow container. Empty by default
# (the binary reads all config from env).
args: []

# No extra volumes at 0.20.5 — chart manages only the jq-modules ConfigMap.
volumes: []
volumeMounts: []

# No extra envFrom at 0.20.5.
extraEnvFrom: []

# No init containers — Redis sidecar removal predates this baseline
# but the field is preserved for chart-shape compatibility.
initContainers: []

nodeSelector: {}
tolerations: []
affinity: {}

# Env vars rendered into the chart's snowplow ConfigMap and consumed
# via envFrom. Only knobs the 0.20.5 binary actually reads.
env:
  DEBUG: "false"
  BLIZZARD: "false"
  SKIP: "false"
  JQ_MODULES_PATH: /jq-modules
  # Cache subsystem activation (0.30.4 Revision 1 binding).
  # CACHE_ENABLED=true wires:
  #   - the dynamic informer factory (Role/RoleBinding/ClusterRole/
  #     ClusterRoleBinding eagerly registered);
  #   - in-process EvaluateRBAC for every RestAction/Widget dispatch;
  #   - zero SubjectAccessReview calls to apiserver (Revision 1 ROLLBACK trigger).
  # Override at install/upgrade time with --set env.CACHE_ENABLED=false to
  # fall back to the 0.30.3 (cache=off) behaviour.
  CACHE_ENABLED: "true"

  # Ship 0.30.237 Stage-1 Lever A — configmap-tunable boot-scope budget.
  # Reads PREWARM_BOOT_TIMEOUT_MINUTES; defaults to 8 (the 0.30.179 raised
  # value pinned by phase1_pip_seed.go's pipGlobalTimeout). If a customer
  # cluster's worst-case unit count (cohorts × harvested {RAs, widgets})
  # cannot complete inside 8 min under GOMAXPROCS-parallel seeding, raise
  # this knob (helm upgrade --set env.PREWARM_BOOT_TIMEOUT_MINUTES=15) and
  # redeploy — bounded recovery without a HARD REVERT. Operator inspects
  # snowplow_phase1_seed_units_planned_total at /debug/vars to project ETA.
  PREWARM_BOOT_TIMEOUT_MINUTES: "8"

jwtSignKeySecretName: jwt-sign-key

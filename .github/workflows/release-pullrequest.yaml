name: release-pullrequest

# Lint-only check for PRs. Replaces the upstream workflow which pushed
# a preview to charts.krateo.io via gh-pages.

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Helm lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4.1.0

      - name: CRD drift check (crd-chart/templates vs snowplow crds/)
        # PR gate for Stage 2: catch a hand-edit to crd-chart/templates/
        # that diverges from the snowplow repo's crds/. At PR time there
        # is no release tag yet, so this checks against snowplow `main`
        # — the reasonable reference for "has someone manually edited
        # crd-chart/templates/ out of sync". The authoritative,
        # tag-pinned sync happens at release time (release-tag.yaml).
        run: |
          set -euo pipefail
          git clone --depth 1 --branch main \
            https://github.com/braghettos/snowplow.git /tmp/snowplow-src
          bash scripts/sync-crds.sh /tmp/snowplow-src --check

      - name: Substitute placeholder versions for lint
        run: |
          # Lint requires concrete versions. Use 0.0.0 as a throwaway.
          sed -i "s/CHART_VERSION/0.0.0/g" chart/Chart.yaml
          sed -i "s/APP_VERSION/0.0.0/g"   chart/Chart.yaml
          sed -i "s/CHART_VERSION/0.0.0/g" crd-chart/Chart.yaml

      - name: Helm lint (crd-chart)
        run: helm lint ./crd-chart

      - name: Build chart deps from local crd-chart
        run: |
          helm package ./crd-chart --destination /tmp/charts
          mkdir -p ./chart/charts
          cp /tmp/charts/snowplow-crd-0.0.0.tgz ./chart/charts/
          helm dependency build ./chart || true

      - name: Helm lint (chart)
        run: helm lint ./chart

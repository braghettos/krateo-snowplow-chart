name: release-pullrequest

# Lint-only check for PRs. Replaces the upstream workflow which pushed
# a preview to charts.krateo.io via gh-pages.
#
# Ship S.1 (chart 0.30.243): single-chart layout — only chart/ is linted.
# The previous crd-chart subchart was deleted; its CRD moved into
# chart/templates/templates.krateo.io_restactions.yaml.

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Helm lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Helm
        uses: azure/setup-helm@v5.0.0

      - name: Substitute placeholder versions for lint
        run: |
          # Lint requires concrete versions. Use 0.0.0 as a throwaway.
          sed -i "s/CHART_VERSION/0.0.0/g" chart/Chart.yaml
          sed -i "s/APP_VERSION/0.0.0/g"   chart/Chart.yaml

      - name: Helm lint (chart)
        run: helm lint ./chart
